name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_to_prod:
        description: 'After dev + test deploys, also deploy prod (requires prod environment approval if configured)'
        type: choice
        options: ['no', 'yes']
        default: 'no'

env:
  AWS_REGION:     us-east-1
  ECR_REPOSITORY: go-microservice
  CDK_DIR:        infrastructure/cdk
  # Apex domain (matches DOMAIN in root .env). Used for Route 53 / local tooling; deploy jobs hit the ALB until DNS is wired.
  DOMAIN: ${{ vars.DOMAIN || 'calgentik.com' }}
  # Optional repo Variables: DESTROY_DEV_AFTER_DEPLOY / DESTROY_TEST_AFTER_DEPLOY = true → run cdk destroy after smoke (default: leave stacks up; use "Teardown stack" workflow to remove).
  # Opt into Node.js 24 for JS-based actions before GitHub’s default switch (see GitHub changelog 2025-09-19).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Unit Tests ───────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@latest
      - name: Generate docs
        run: swag init -g cmd/server/main.go -o docs --parseDependency --parseInternal
      - name: Run unit tests
        run: go test ./internal/... -v -count=1 -race -timeout 60s

  # ── Integration Tests ────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@latest
      - name: Generate docs
        run: swag init -g cmd/server/main.go -o docs --parseDependency --parseInternal
      - name: Generate dev certs
        run: |
          mkdir -p certs
          openssl req -x509 -newkey ec \
            -pkeyopt ec_paramgen_curve:P-256 \
            -keyout certs/dev-key.pem \
            -out certs/dev-cert.pem \
            -days 365 -nodes \
            -subj "/CN=localhost/O=go-microservice-ci" \
            -addext "subjectAltName=DNS:localhost,IP:127.0.0.1"
      - name: Start test environment
        run: docker compose -f deployments/docker-compose.test.yml up -d --build --wait
        timeout-minutes: 5
      - name: Run integration tests
        run: |
          TEST_HOST=localhost \
          TEST_PORT=9443 \
          TEST_SCHEME=https \
          TEST_SKIP_TLS_VERIFY=true \
          MONGO_URI=mongodb://localhost:27117 \
          MONGO_DB=userservice_test \
          JWT_SECRET=test-jwt-secret-do-not-use-in-prod \
          go test -tags=integration ./tests/integration/... -v -count=1 -timeout 120s
      - name: Print container logs on failure
        if: failure()
        run: docker compose -f deployments/docker-compose.test.yml logs
      - name: Tear down test environment
        if: always()
        run: docker compose -f deployments/docker-compose.test.yml down

  # ── Frontend E2E (Playwright) ───────────────────────────────────────────────
  frontend-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - name: Start E2E stack (API + Mongo + SPA)
        run: docker compose -f deployments/docker-compose.e2e.yml up -d --build
        timeout-minutes: 12
      - name: Wait for API health
        run: |
          for i in $(seq 1 45); do
            curl -sf http://127.0.0.1:18080/health && exit 0
            sleep 2
          done
          echo "API did not become healthy"; exit 1
      - name: Wait for web server
        run: |
          for i in $(seq 1 30); do
            curl -sf -o /dev/null http://127.0.0.1:14173/ && exit 0
            sleep 2
          done
          echo "Web did not become ready"; exit 1
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: cd frontend && npm ci
      - name: Install Playwright Chromium
        run: cd frontend && npx playwright install --with-deps chromium
      - name: Run Playwright
        env:
          E2E_BASE_URL: http://127.0.0.1:14173
          E2E_SKIP_WEB_SERVER: '1'
          E2E_API_BASE_URL: http://127.0.0.1:18080
        run: cd frontend && npx playwright test
      - name: Tear down E2E stack
        if: always()
        run: docker compose -f deployments/docker-compose.e2e.yml down -v

  # ── Build & Push to ECR ──────────────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [integration-tests, frontend-e2e]
    # ECR push only when you manually run this workflow on main (not on merge; avoids cost on every commit)
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      ecr_url:   ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0 (Node 24)
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" --region "$AWS_REGION" \
            || aws ecr create-repository --repository-name "$ECR_REPOSITORY" --region "$AWS_REGION" \
                 --image-scanning-configuration scanOnPush=true
      - name: Set image tag
        id: meta
        run: echo "tag=$(echo ${{ github.sha }} | head -c7)" >> $GITHUB_OUTPUT
      - name: Install swag and generate docs
        run: |
          go install github.com/swaggo/swag/cmd/swag@latest
          swag init -g cmd/server/main.go -o docs --parseDependency --parseInternal
      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ steps.meta.outputs.tag }}
        run: |
          docker build --platform linux/amd64 -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag  $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                      $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  # ── Deploy to Dev ─────────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy → Dev → Smoke
    runs-on: ubuntu-latest
    needs: build
    environment: dev
    # Enable required reviewers on GitHub Environment "dev" to approve before dev deploy (after build).
    # Smoke uses ALB DNS from CDK outputs (skip TLS verify; cert is for your domain, not *.elb.amazonaws.com). Add Route 53 + dev-api.{DOMAIN} later for hostname-based checks.
    # Next job (deploy-test) uses environment "test" — enable required reviewers on that environment to gate dev → test.
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0 (Node 24)
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Verify CDK bootstrap IAM (AssumeRole)
        env:
          EXPECTED_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: bash infrastructure/cdk/scripts/verify-cdk-bootstrap-iam.sh
      - name: Install AWS CDK
        run: npm install -g aws-cdk
      - name: Install CDK Go dependencies
        run: cd $CDK_DIR && go mod download
      - name: CDK deploy (dev)
        env:
          CDK_ENV: dev
          CDK_REGION: ${{ env.AWS_REGION }}
          CDK_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_APP_IMAGE: ${{ needs.build.outputs.ecr_url }}:${{ needs.build.outputs.image_tag }}
          CDK_CERT_ARN: ${{ secrets.ACM_CERTIFICATE_ARN }}
          CDK_JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CDK_DESIRED_COUNT: "1"
          CDK_TASK_CPU: "256"
          CDK_TASK_MEMORY: "512"
        run: cd $CDK_DIR && cdk deploy GoMicroservice-Dev --require-approval never --outputs-file outputs.json
      - name: Wait for healthy
        run: |
          ALB=$(cat $CDK_DIR/outputs.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(list(d.values())[0]['ALBDnsName'])")
          echo "Health check: https://$ALB/health (ALB DNS; Route 53 not required for this step)"
          for i in $(seq 1 20); do
            S=$(curl -sk "https://$ALB/health" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null)
            echo "[$i] $S"; [ "$S" = "healthy" ] && break; sleep 15
          done
          [ "$S" = "healthy" ] || exit 1
      - name: Smoke test
        run: |
          ALB=$(cat $CDK_DIR/outputs.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(list(d.values())[0]['ALBDnsName'])")
          TEST_HOST=$ALB TEST_PORT=443 TEST_SCHEME=https TEST_SKIP_TLS_VERIFY=true \
          go test -tags=integration ./tests/integration/... -v -count=1 -run TestAPISmoke -timeout 120s
      - name: CDK destroy (dev)
        if: always() && vars.DESTROY_DEV_AFTER_DEPLOY == 'true'
        env:
          CDK_ENV: dev
          CDK_REGION: ${{ env.AWS_REGION }}
          CDK_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_APP_IMAGE: ${{ needs.build.outputs.ecr_url }}:${{ needs.build.outputs.image_tag }}
          CDK_CERT_ARN: ${{ secrets.ACM_CERTIFICATE_ARN }}
          CDK_JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CDK_DESIRED_COUNT: "1"
          CDK_TASK_CPU: "256"
          CDK_TASK_MEMORY: "512"
        run: cd $CDK_DIR && cdk destroy GoMicroservice-Dev --force

  # ── Deploy to Test ────────────────────────────────────────────────────────────
  deploy-test:
    name: Deploy → Test → ALB Smoke
    runs-on: ubuntu-latest
    needs: [build, deploy-dev]
    environment: test
    # Required reviewers on GitHub Environment "test" = manual approval before this job runs (after dev succeeds).
    # Integration tests use ALB DNS from CDK (skip TLS verify) until Route 53 points test-api.{DOMAIN} at the ALB.
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0 (Node 24)
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Verify CDK bootstrap IAM (AssumeRole)
        env:
          EXPECTED_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: bash infrastructure/cdk/scripts/verify-cdk-bootstrap-iam.sh
      - name: Install AWS CDK
        run: npm install -g aws-cdk
      - name: Install CDK Go dependencies
        run: cd $CDK_DIR && go mod download
      - name: CDK deploy (test)
        env:
          CDK_ENV: test
          CDK_REGION: ${{ env.AWS_REGION }}
          CDK_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_APP_IMAGE: ${{ needs.build.outputs.ecr_url }}:${{ needs.build.outputs.image_tag }}
          CDK_CERT_ARN: ${{ secrets.ACM_CERTIFICATE_ARN }}
          CDK_JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CDK_DESIRED_COUNT: "1"
          CDK_TASK_CPU: "512"
          CDK_TASK_MEMORY: "1024"
        run: cd $CDK_DIR && cdk deploy GoMicroservice-Test --require-approval never --outputs-file outputs.json
      - name: Wait for healthy
        run: |
          ALB=$(cat $CDK_DIR/outputs.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(list(d.values())[0]['ALBDnsName'])")
          echo "Health check: https://$ALB/health (ALB DNS; Route 53 not required for this step)"
          for i in $(seq 1 20); do
            S=$(curl -sk "https://$ALB/health" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null)
            echo "[$i] $S"; [ "$S" = "healthy" ] && break; sleep 15
          done
          [ "$S" = "healthy" ] || exit 1
      # Full TestAPI needs MONGO_URI from the test runner; ECS Mongo is only inside the task. Same ALB smoke as deploy-dev until DB is reachable from Actions (e.g. Atlas + allowlist, or self-hosted runner in VPC).
      - name: Integration smoke (ALB)
        run: |
          ALB=$(cat $CDK_DIR/outputs.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(list(d.values())[0]['ALBDnsName'])")
          TEST_HOST=$ALB TEST_PORT=443 TEST_SCHEME=https TEST_SKIP_TLS_VERIFY=true \
          go test -tags=integration ./tests/integration/... -v -count=1 -run TestAPISmoke -timeout 120s
      - name: CDK destroy (test)
        if: always() && vars.DESTROY_TEST_AFTER_DEPLOY == 'true'
        env:
          CDK_ENV: test
          CDK_REGION: ${{ env.AWS_REGION }}
          CDK_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_APP_IMAGE: ${{ needs.build.outputs.ecr_url }}:${{ needs.build.outputs.image_tag }}
          CDK_CERT_ARN: ${{ secrets.ACM_CERTIFICATE_ARN }}
          CDK_JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CDK_DESIRED_COUNT: "1"
          CDK_TASK_CPU: "512"
          CDK_TASK_MEMORY: "1024"
        run: cd $CDK_DIR && cdk destroy GoMicroservice-Test --force

  # ── Deploy to Prod (manual approval via GitHub Environment "prod") ─────────────
  deploy-prod:
    name: Deploy → Prod
    runs-on: ubuntu-latest
    needs: [build, deploy-test]
    environment: prod
    # Required reviewers on Environment "prod" = manual approval before deploy (after test succeeds).
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && github.event.inputs.deploy_to_prod == 'yes'
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0 (Node 24)
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Verify CDK bootstrap IAM (AssumeRole)
        env:
          EXPECTED_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: bash infrastructure/cdk/scripts/verify-cdk-bootstrap-iam.sh
      - name: Install AWS CDK
        run: npm install -g aws-cdk
      - name: Install CDK Go dependencies
        run: cd $CDK_DIR && go mod download
      - name: CDK deploy (prod)
        env:
          CDK_ENV: prod
          CDK_REGION: ${{ env.AWS_REGION }}
          CDK_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_APP_IMAGE: ${{ needs.build.outputs.ecr_url }}:${{ needs.build.outputs.image_tag }}
          CDK_CERT_ARN: ${{ secrets.ACM_CERTIFICATE_ARN }}
          CDK_JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CDK_DESIRED_COUNT: "2"
          CDK_TASK_CPU: "512"
          CDK_TASK_MEMORY: "1024"
        run: |
          cd $CDK_DIR
          cdk deploy GoMicroservice-Prod --require-approval never --outputs-file outputs.json
          ALB=$(cat outputs.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(list(d.values())[0]['ALBDnsName'])")
          echo "✅ Prod deployed! URL: https://$ALB"
          echo "   Tear down: Actions → Teardown stack → choose prod"
      - name: Route 53 alias (api → prod ALB)
        env:
          DNS_ZONE: ${{ env.DOMAIN }}
        run: make route53-alias ENV=prod