services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8443:8443"
    env_file:
      - ../.env
    environment:
      MONGO_URI: mongodb://mongo:27017
      ENV: development
      TLS_PORT: "8443"
      TLS_CERT: /app/certs/dev-cert.pem
      TLS_KEY: /app/certs/dev-key.pem
    volumes:
      - ../certs:/app/certs
      - ../docs:/app/docs
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data: