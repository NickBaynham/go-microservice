basePath: /
definitions:
  go-microservice_internal_models.CreateUserRequest:
    description: Registration request body
    properties:
      email:
        example: alice@example.com
        type: string
      name:
        example: Alice Smith
        minLength: 2
        type: string
      password:
        example: securepassword
        minLength: 8
        type: string
    required:
    - email
    - name
    - password
    type: object
  go-microservice_internal_models.ErrorResponse:
    description: Error response
    properties:
      error:
        example: invalid credentials
        type: string
    type: object
  go-microservice_internal_models.ForgotPasswordRequest:
    description: Forgot-password request
    properties:
      email:
        example: alice@example.com
        type: string
    required:
    - email
    type: object
  go-microservice_internal_models.ForgotPasswordResponse:
    description: Forgot-password response
    properties:
      message:
        example: If an account exists for this email, you will receive reset instructions.
        type: string
      reset_token:
        description: ResetToken is returned only when ENV=test (for automated E2E);
          never in production or development.
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    type: object
  go-microservice_internal_models.HealthResponse:
    description: Health check response
    properties:
      checks:
        additionalProperties:
          type: string
        type: object
      status:
        example: healthy
        type: string
      timestamp:
        example: "2024-01-01T00:00:00Z"
        type: string
    type: object
  go-microservice_internal_models.ListUsersResponse:
    description: List of users response
    properties:
      count:
        example: 5
        type: integer
      users:
        items:
          $ref: '#/definitions/go-microservice_internal_models.User'
        type: array
    type: object
  go-microservice_internal_models.LoginRequest:
    description: Login request body
    properties:
      email:
        example: alice@example.com
        type: string
      password:
        example: securepassword
        type: string
    required:
    - email
    - password
    type: object
  go-microservice_internal_models.LoginResponse:
    description: Access token (short-lived), rotating refresh token, and user info.
      Field token mirrors access_token for older clients.
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      expires_in:
        example: 900
        type: integer
      refresh_token:
        example: 64-char-hex...
        type: string
      token:
        example: same as access_token
        type: string
      user:
        $ref: '#/definitions/go-microservice_internal_models.User'
    type: object
  go-microservice_internal_models.MessageResponse:
    description: Success message response
    properties:
      message:
        example: user deleted successfully
        type: string
    type: object
  go-microservice_internal_models.RefreshResponse:
    description: New access + refresh pair
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      token:
        type: string
    type: object
  go-microservice_internal_models.RefreshTokenBody:
    description: Refresh token string from login or previous refresh
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  go-microservice_internal_models.RegisterResponse:
    description: Successful registration response
    properties:
      message:
        example: user registered successfully
        type: string
      user:
        $ref: '#/definitions/go-microservice_internal_models.User'
      verification_token:
        description: VerificationToken is returned only when ENV=test and email verification
          is required (for automated tests).
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    type: object
  go-microservice_internal_models.ResendVerificationRequest:
    description: Resend verification email
    properties:
      email:
        example: alice@example.com
        type: string
    required:
    - email
    type: object
  go-microservice_internal_models.ResetPasswordRequest:
    description: Reset-password request
    properties:
      password:
        example: newSecurePass1
        minLength: 8
        type: string
      token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    required:
    - password
    - token
    type: object
  go-microservice_internal_models.UpdateUserRequest:
    description: Update request body (all fields optional)
    properties:
      email:
        example: newemail@example.com
        type: string
      name:
        example: Alice Updated
        minLength: 2
        type: string
      role:
        example: admin
        type: string
    type: object
  go-microservice_internal_models.User:
    description: User account information
    properties:
      created_at:
        example: "2024-01-01T00:00:00Z"
        type: string
      email:
        example: alice@example.com
        type: string
      email_verified:
        example: true
        type: boolean
      id:
        example: 64b1f9e2c3d4e5f6a7b8c9d0
        type: string
      name:
        example: Alice Smith
        type: string
      role:
        example: user
        type: string
      updated_at:
        example: "2024-01-01T00:00:00Z"
        type: string
    type: object
  go-microservice_internal_models.VerifyEmailRequest:
    description: Email verification body
    properties:
      token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    required:
    - token
    type: object
host: localhost:8443
info:
  contact:
    email: support@example.com
    name: API Support
  description: A production-ready user management REST API with JWT authentication.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: go-microservice API
  version: "1.0"
paths:
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Sends a reset link to the email when an account exists. Always
        returns the same message (does not reveal whether the email is registered).
        In production, SMTP and PASSWORD_RESET_FRONTEND_URL must be configured.
      parameters:
      - description: Email address
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-microservice_internal_models.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ForgotPasswordResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
        "503":
          description: Password reset not configured (production)
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
      summary: Request password reset
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns a short-lived access JWT plus
        a rotating refresh token.
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-microservice_internal_models.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-microservice_internal_models.LoginResponse'
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
        "403":
          description: Email not verified (when verification is required)
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
      summary: Login
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Revokes the given refresh token (client should discard access +
        refresh locally).
      parameters:
      - description: Refresh token to revoke
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-microservice_internal_models.RefreshTokenBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-microservice_internal_models.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
      summary: Logout
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchanges a valid refresh token for a new access token and a new
        refresh token (rotation).
      parameters:
      - description: Current refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-microservice_internal_models.RefreshTokenBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-microservice_internal_models.RefreshResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
      summary: Refresh tokens
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user account. The first user in the database becomes
        "admin"; everyone else is "user". Client-supplied roles are ignored. When
        EMAIL_VERIFICATION_REQUIRED is true, the user is created with email_verified
        false and a verification email is sent; production requires SMTP and EMAIL_VERIFICATION_FRONTEND_URL.
      parameters:
      - description: Registration details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-microservice_internal_models.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/go-microservice_internal_models.RegisterResponse'
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
        "409":
          description: Email already exists
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
        "503":
          description: Email verification enabled but not configured (production)
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
      summary: Register a new user
      tags:
      - auth
  /auth/resend-verification:
    post:
      consumes:
      - application/json
      description: Sends a new verification link when the account exists and is not
        yet verified. Same response whether or not the email is registered (privacy).
        Requires EMAIL_VERIFICATION_REQUIRED; in production, SMTP and EMAIL_VERIFICATION_FRONTEND_URL
        must be set.
      parameters:
      - description: Email address
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-microservice_internal_models.ResendVerificationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-microservice_internal_models.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
      summary: Resend verification email
      tags:
      - auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      description: Sets a new password using the short-lived token from the reset
        email.
      parameters:
      - description: Token and new password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-microservice_internal_models.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-microservice_internal_models.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
      summary: Complete password reset
      tags:
      - auth
  /auth/verify-email:
    post:
      consumes:
      - application/json
      description: Confirms email ownership using the token from the registration
        email. Public endpoint.
      parameters:
      - description: Verification token from email
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-microservice_internal_models.VerifyEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-microservice_internal_models.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
      summary: Verify email address
      tags:
      - auth
  /health:
    get:
      description: Returns the health status of the service and its dependencies.
      produces:
      - application/json
      responses:
        "200":
          description: Service is healthy
          schema:
            $ref: '#/definitions/go-microservice_internal_models.HealthResponse'
        "503":
          description: Service is degraded
          schema:
            $ref: '#/definitions/go-microservice_internal_models.HealthResponse'
      summary: Health check
      tags:
      - system
  /me:
    get:
      description: Returns the profile of the currently authenticated user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-microservice_internal_models.User'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - users
  /users:
    get:
      description: Returns all users in the system. Admin only.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ListUsersResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
        "403":
          description: Admin access required
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List all users
      tags:
      - users
  /users/{id}:
    delete:
      description: Permanently deletes a user by ID. Admin only.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-microservice_internal_models.MessageResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
        "403":
          description: Admin access required
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a user
      tags:
      - users
    get:
      description: Returns a single user by their ID. Admin only.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-microservice_internal_models.User'
        "400":
          description: Invalid ID
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
        "403":
          description: Admin access required
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get a user by ID
      tags:
      - users
    put:
      consumes:
      - application/json
      description: Updates a user's profile. Users can update themselves; admins can
        update anyone and change roles.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/go-microservice_internal_models.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/go-microservice_internal_models.User'
        "400":
          description: Validation error or no fields to update
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/go-microservice_internal_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a user
      tags:
      - users
schemes:
- https
securityDefinitions:
  BearerAuth:
    description: 'Enter your JWT token as: Bearer <token>'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
